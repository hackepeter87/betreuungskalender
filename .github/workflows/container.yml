name: Container

on:
  workflow_call:
  push:
    paths:
      - Dockerfile
      - compose.yaml
      - package.json
      - package-lock.json
      - server/**
      - shared/**
      - src/**
      - public/**
      - scripts/**
      - .github/actions/validate-container/**
      - .github/workflows/container.yml
  pull_request:
    paths:
      - Dockerfile
      - compose.yaml
      - package.json
      - package-lock.json
      - server/**
      - shared/**
      - src/**
      - public/**
      - scripts/**
      - .github/actions/validate-container/**
      - .github/workflows/container.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/validate-container
