name: Bug report
description: Report reproducible incorrect behavior without personal data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        **Privacy warning:** Do not include real children's names, addresses,
        schools, schedules, court documents, evidence, authentication data, or
        family details. Never attach JSON backups, SQLite files, PDFs, or CSVs.
        Anonymize screenshots completely.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the observable behavior using fictional data.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Development
        - systemd/LXC
        - Docker/Podman
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Browser, OS, and relevant non-secret configuration
      description: Do not paste `.env`, cookies, tokens, or proxy headers.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed personal data and did not attach backups, databases, PDFs, or CSVs.
          required: true
