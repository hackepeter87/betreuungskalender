name: Release validation

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Strict release validation
        run: npm run release:check:strict

      - name: Validate container
        uses: ./.github/actions/validate-container

      - name: Create runtime archive
        run: |
          tar -czf betreuungskalender-${GITHUB_REF_NAME}.tar.gz \
            dist dist-server scripts deploy Dockerfile.release package.json \
            package-lock.json .env.example README.md LICENSE CHANGELOG.md docs
          sha256sum betreuungskalender-${GITHUB_REF_NAME}.tar.gz \
            > betreuungskalender-${GITHUB_REF_NAME}.tar.gz.sha256
          tar -tzf betreuungskalender-${GITHUB_REF_NAME}.tar.gz \
            | grep -Fx "docs/release-notes/${GITHUB_REF_NAME}.md"

      - uses: actions/upload-artifact@v4
        with:
          name: betreuungskalender-${{ github.ref_name }}
          path: |
            betreuungskalender-${{ github.ref_name }}.tar.gz
            betreuungskalender-${{ github.ref_name }}.tar.gz.sha256
            docs/release-notes/${{ github.ref_name }}.md
          if-no-files-found: error
          retention-days: 14
