name: Publish release image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.2.1
        required: true
        type: string
      upload_digest_to_release:
        description: Upload the image digest file to the matching GitHub release
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Resolve release tag and image tags
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || false }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_UPLOAD_DIGEST: ${{ inputs.upload_digest_to_release || false }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
            upload_digest="$INPUT_UPLOAD_DIGEST"
          else
            tag="$RELEASE_TAG"
            upload_digest="true"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be SemVer with a leading v, got '$tag'."
            exit 1
          fi

          image="${REGISTRY}/${IMAGE_NAME,,}"
          version="${tag#v}"
          tags="${image}:${tag}"$'\n'"${image}:${version}"
          if [[ "$EVENT_NAME" != "workflow_dispatch" && "$RELEASE_PRERELEASE" != "true" ]]; then
            tags+=$'\n'"${image}:latest"
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "image=$image"
            echo "upload_digest=$upload_digest"
            echo "tags<<EOF"
            printf '%s\n' "$tags"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Resolve checked-out commit
        id: git
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Strict release validation
        run: npm run release:check:strict

      - name: Validate release runtime image
        run: DOCKERFILE=Dockerfile.release bash scripts/container-smoke.sh

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: ${{ steps.release.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.release.outputs.version }}
            org.opencontainers.image.revision=${{ steps.git.outputs.commit }}
            org.opencontainers.image.title=betreuungskalender
            org.opencontainers.image.description=Betreuungskalender release runtime image

      - name: Write image digest
        shell: bash
        run: |
          digest_file="betreuungskalender-${{ steps.release.outputs.tag }}.image-digest.txt"
          {
            echo "Image: ${{ steps.release.outputs.image }}"
            echo "Digest: ${{ steps.build.outputs.digest }}"
            echo "Immutable reference: ${{ steps.release.outputs.image }}@${{ steps.build.outputs.digest }}"
            echo
            echo "Tags:"
            printf '%s\n' "${{ steps.release.outputs.tags }}"
          } > "$digest_file"

          {
            echo "## GHCR image"
            echo
            echo "- Image: \`${{ steps.release.outputs.image }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Immutable reference: \`${{ steps.release.outputs.image }}@${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: betreuungskalender-${{ steps.release.outputs.tag }}-image-digest
          path: betreuungskalender-${{ steps.release.outputs.tag }}.image-digest.txt
          if-no-files-found: error
          retention-days: 14

      - name: Upload image digest to release
        if: ${{ steps.release.outputs.upload_digest == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag }}" \
            "betreuungskalender-${{ steps.release.outputs.tag }}.image-digest.txt" \
            --clobber
