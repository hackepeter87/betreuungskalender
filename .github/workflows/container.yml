name: Container

on:
  workflow_call:
  push:
    paths:
      - Dockerfile
      - Dockerfile.release
      - compose.yaml
      - deploy/**
      - package.json
      - package-lock.json
      - server/**
      - shared/**
      - src/**
      - public/**
      - scripts/**
      - .github/actions/validate-container/**
      - .github/workflows/container.yml
  pull_request:
    paths:
      - Dockerfile
      - Dockerfile.release
      - compose.yaml
      - deploy/**
      - package.json
      - package-lock.json
      - server/**
      - shared/**
      - src/**
      - public/**
      - scripts/**
      - .github/actions/validate-container/**
      - .github/workflows/container.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/validate-container

  validate-release-runtime:
    name: Validate release runtime image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: DOCKERFILE=Dockerfile.release bash scripts/container-smoke.sh
