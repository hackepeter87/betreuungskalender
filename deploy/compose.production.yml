services:
  betreuungskalender:
    image: ghcr.io/hackepeter87/betreuungskalender:production
    restart: unless-stopped
    env_file:
      - app.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      DATABASE_PATH: /data/app.sqlite
      BACKUP_DIR: /backups
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${HOST_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
