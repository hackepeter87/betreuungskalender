name: Promote testing image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to promote to testing, for example v1.4.0
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    name: Promote release image to testing
    runs-on: ubuntu-latest
    steps:
      - name: Resolve image references
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          tag="$INPUT_TAG"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be SemVer with a leading v, got '$tag'."
            exit 1
          fi

          image="${REGISTRY}/${IMAGE_NAME,,}"
          {
            echo "tag=$tag"
            echo "version=${tag#v}"
            echo "image=$image"
            echo "source_ref=${image}:${tag}"
            echo "target_ref=${image}:testing"
          } >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Resolve release commit
        id: git
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Promote immutable release image
        id: promote
        shell: bash
        run: |
          source_ref="${{ steps.release.outputs.source_ref }}"
          target_ref="${{ steps.release.outputs.target_ref }}"

          source_digest="$(docker buildx imagetools inspect "$source_ref" | awk '/^Digest:/ {print $2; exit}')"
          if [[ -z "$source_digest" ]]; then
            echo "::error::Could not resolve digest for $source_ref."
            exit 1
          fi

          docker buildx imagetools create --prefer-index=false --tag "$target_ref" "$source_ref"

          target_digest="$(docker buildx imagetools inspect "$target_ref" | awk '/^Digest:/ {print $2; exit}')"
          if [[ "$target_digest" != "$source_digest" ]]; then
            echo "::error::testing digest $target_digest does not match release digest $source_digest."
            exit 1
          fi

          {
            echo "digest=$target_digest"
            echo "immutable_ref=${{ steps.release.outputs.image }}@$target_digest"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize promotion
        run: |
          {
            echo "## Testing promotion"
            echo
            echo "- Version: \`${{ steps.release.outputs.version }}\`"
            echo "- Release tag: \`${{ steps.release.outputs.tag }}\`"
            echo "- Commit: \`${{ steps.git.outputs.commit }}\`"
            echo "- Target tag: \`${{ steps.release.outputs.target_ref }}\`"
            echo "- Digest: \`${{ steps.promote.outputs.digest }}\`"
            echo "- Immutable reference: \`${{ steps.promote.outputs.immutable_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
