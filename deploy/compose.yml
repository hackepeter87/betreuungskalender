services:
  betreuungskalender:
    image: betreuungskalender:${APP_RELEASE_VERSION:?Set APP_RELEASE_VERSION in .env}
    build:
      context: ${APP_RELEASE_DIR:?Set APP_RELEASE_DIR in .env}
      dockerfile: Dockerfile.release
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
      DATABASE_PATH: /data/app.sqlite
      BACKUP_DIR: /backups
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${HOST_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
